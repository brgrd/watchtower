    icon: "sc"
    signals: ["supply chain", "typosquat", "malicious package", "dependency confusion", "repo hijack", "malicious", "backdoor", "trojan", "compromised", "poisoned", "solarwinds", "software bill", "sbom", "open source"]
  identity:
    label: "Identity / Auth"
    icon: "id"
    signals: ["active directory", "ldap", "kerberos", "sso", "oidc", "oauth", "jwt", "saml", "mfa", "2fa", "password", "credential", "token", "session hijack", "phishing", "authentication", "authorization", "brute force", "account takeover"]

budgets:
  max_agent_steps: 20
  max_feeds_polled: 80
  max_new_feeds: 3
  max_url_fetches: 30
  max_fetch_workers: 6
  max_clusters_output: 15
  max_links_per_cluster: 5
  max_runtime_seconds: 480
  since_hours: 6
  seen_ttl_days: 7

runtime:
  placeholder_mode_default: true   # safest/free default for local demo


  links_per_cluster_limit: 5

domain_taxonomy:
  pkg_npm:
    label: "npm / Node"
    icon: "pkg"
    signals: ["npm", "node", "package.json", "yarn", "pnpm", "node.js", "nodejs", "javascript package", "js package", "npx"]
  pkg_pypi:
    label: "PyPI / Python"
    icon: "py"
    signals: ["pypi", "pip", "python package", "pyproject", "python", "pip install", "requirements.txt", "poetry", "setuptools"]
  pkg_maven:
    label: "Maven / Java"
    icon: "java"
    signals: ["maven", "gradle", "java", "spring", "log4j", "apache", "struts", "hibernate", "tomcat", "jvm"]
  pkg_nuget:
    label: ".NET / NuGet"
    icon: ".net"
    signals: [".net", "nuget", "asp.net", "dotnet", "csharp", "c#", "microsoft", "powershell", "blazor"]
  pkg_gem:
    label: "RubyGems"
    icon: "gem"
    signals: ["rubygems", "ruby gem", "bundler", "gemfile", "ruby", "rails gem"]
  browser_ext:
    label: "Browser Extensions"
    icon: "ext"
    signals: ["browser extension", "chrome extension", "firefox addon", "manifest v", "webstore", "browser plugin", "add-on"]
  ca_trust:
    label: "CA / PKI Trust"
    icon: "pki"
    signals: ["certificate authority", "root certificate", "x.509", "ocsp", "code signing cert", "ca bundle", "trust store", "intermediate ca"]
  cloud_iam:
    label: "Cloud / IAM"
    icon: "cloud"
    signals: ["iam", "aws", "azure", "gcp", "access key", "service account", "secrets manager", "cloud", "s3", "ec2", "eks", "lambda", "azure ad", "entra", "gke", "cloudflare", "google cloud", "cloud storage", "bucket"]
  container:
    label: "Containers / K8s"
    icon: "k8s"
    signals: ["docker", "container", "kubernetes", "helm", "k8s", "pod", "image", "registry", "oci", "containerd", "runc", "kubectl", "ingress", "rbac", "namespace"]
  os_kernel:
    label: "OS / Kernel"
    icon: "os"
    signals: ["linux kernel", "windows kernel", "privilege escalation", "lpe", "ebpf", "windows", "linux", "ubuntu", "debian", "rhel", "android", "macos", "cve-", "patch tuesday", "zero-day", "zeroday", "rce", "remote code execution", "arbitrary code", "exploit", "vulnerability", "advisory", "security update", "patch"]
  web_framework:
    label: "Web / Servers"
    icon: "web"
    signals: ["nginx", "apache", "iis", "express", "django", "rails", "fastapi", "next.js", "nextjs", "react", "wordpress", "php", "http", "web application", "sql injection", "sqli", "xss", "csrf", "flask", "tomcat", "server-side", "api endpoint"]
  crypto_lib:
    label: "Crypto Libraries"
    icon: "tls"
    signals: ["openssl", "libssl", "mbedtls", "gnutls", "cipher", "ecdsa", "rsa key", "tls", "ssl", "certificate", "encryption", "key management", "hash", "sha", "rsa", "aes", "cryptographic"]
  supply_chain:

name: Watchtower — Agentic InfraSec Monitor

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

concurrency:
  group: watchtower-infrasec
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v5

      - name: Restore ephemeral cache
        uses: actions/cache@v5
        with:
          path: .cache/
          key: cache-${{ runner.os }}-${{ hashFiles('agent/**', 'requirements.txt') }}
          restore-keys: |
            cache-${{ runner.os }}-

      - name: Setup Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Gate by America/New_York hours (6,18)
        id: gate
        run: |
          python - <<'PY'
          import os, datetime, zoneinfo
          ny_hour = datetime.datetime.now(zoneinfo.ZoneInfo("America/New_York")).hour
          within = str(ny_hour in (6,18)).lower()
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
            fh.write(f"within={within}\n")
          print(f"NY_HOUR={ny_hour} within={within}")
          PY

      - name: Run Watchtower (plan → act → observe)
        if: steps.gate.outputs.within == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          WATCHTOWER_PLACEHOLDER_MODE: "false"
        run: |
          python -m agent.runner

      - name: Commit report/state updates
        if: ${{ !cancelled() }}
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add reports/ state/ || true
            git commit -m "chore(watchtower): briefing update" || true
            git pull --rebase origin main || true
            git push
          fi

  deploy-pages:
    needs: run
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main   # must be main — not the trigger SHA — so we get the report pushed by the run job
      - name: Upload briefing site
        uses: actions/upload-pages-artifact@v5
        with:
          path: reports
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
